<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Ultimate Tic-Tac-Toe Arena</title>
        <link rel="stylesheet" href="styles.css" />
    </head>
    <body>
        <div id="ui-layer">
            <div class="panel">
                <h1>AI Ultimate TTT</h1>
                <div class="status-box p1">
                    <h3 id="p1-status">Player 1 (Red X)</h3>
                    <p>Matches Won: <span id="p1-score">0</span></p>
                </div>
                <div class="status-box p2">
                    <h3 id="p2-status">Player 2 (Yellow O)</h3>
                    <p>Matches Won: <span id="p2-score">0</span></p>
                </div>
                <h2 id="turn-indicator" style="margin-top: 20px">
                    Waiting for agents...
                </h2>
            </div>
        </div>

        <div id="canvas-container">
            <div class="view-panel">
                <canvas id="sim-canvas" width="540" height="540"></canvas>
            </div>
        </div>
        <script src="script.js"></script>
    </body>
</html>
